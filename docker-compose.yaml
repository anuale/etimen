version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etimen-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://etimen:etimen_secure_pass@db:5432/etimen?connection_limit=5
      - NEXTAUTH_URL=https://bsr41lqbdqxe9imp133h0isl.152.53.151.102.sslip.io
      - NEXTAUTH_SECRET=etimen-super-secret-key-change-in-production
      - NEXT_PUBLIC_APP_NAME=Etimen
      - NEXT_PUBLIC_APP_URL=https://bsr41lqbdqxe9imp133h0isl.152.53.151.102.sslip.io
      - NODE_OPTIONS=--max-old-space-size=1024
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etimen-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    stop_grace_period: 30s

  db:
    image: postgres:16-alpine
    container_name: etimen-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=etimen
      - POSTGRES_USER=etimen
      - POSTGRES_PASSWORD=etimen_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etimen -d etimen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - etimen-network

volumes:
  postgres_data:
    driver: local

networks:
  etimen-network:
    driver: bridge
