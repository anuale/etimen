version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etimen-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://etimen:etimen_secure_pass@db:5433/etimen
      - NEXTAUTH_URL=https://bsr41lqbdqxe9imp133h0isl.152.53.151.102.sslip.io
      - NEXTAUTH_SECRET=etimen-super-secret-key-change-in-production
      - NEXT_PUBLIC_APP_NAME=Etimen
      - NEXT_PUBLIC_APP_URL=https://bsr41lqbdqxe9imp133h0isl.152.53.151.102.sslip.io
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etimen-network

  db:
    image: postgres:16-alpine
    container_name: etimen-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=etimen
      - POSTGRES_USER=etimen
      - POSTGRES_PASSWORD=etimen_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etimen -d etimen"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etimen-network

volumes:
  postgres_data:
    driver: local

networks:
  etimen-network:
    driver: bridge
